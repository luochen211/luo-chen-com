<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">简单方案撬动最大杠杆</title>
  <desc id="desc">单次 API 调用、多轮 Agent 循环、可验收结果之间的杠杆关系图。</desc>
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L16,6 L0,12 Z" fill="#002FA7"/>
    </marker>
    <style>
      .paper{fill:#FAFAF8}
      .ink{fill:#0A0A0A}
      .blue{fill:#002FA7}
      .muted{fill:#737373}
      .line{fill:none;stroke:#0A0A0A;stroke-width:2}
      .thin{fill:none;stroke:#D4D4D2;stroke-width:1}
      .blue-line{fill:none;stroke:#002FA7;stroke-width:4}
      .blue-thin{fill:none;stroke:#002FA7;stroke-width:2}
      .label{font-family:Inter, "Noto Sans SC", "PingFang SC", Arial, sans-serif;font-size:34px;font-weight:500;letter-spacing:0}
      .small{font-family:"JetBrains Mono", "Noto Sans SC", monospace;font-size:22px;font-weight:400;letter-spacing:.08em}
      .micro{font-family:"JetBrains Mono", "Noto Sans SC", monospace;font-size:18px;font-weight:400;letter-spacing:.08em}
      .num{font-family:Inter, Arial, sans-serif;font-size:88px;font-weight:200;letter-spacing:0}
    </style>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" class="thin"/>
    </pattern>
  </defs>

  <rect width="1600" height="1000" class="paper"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity=".72"/>

  <line x1="120" y1="166" x2="1480" y2="166" class="line"/>
  <text x="120" y="126" class="small muted">LEVERAGE MODEL / MINIMAL INPUT, COMPOUNDED WORK</text>
  <text x="1320" y="126" class="micro muted">16:10 SVG</text>

  <g transform="translate(120 302)">
    <rect x="0" y="0" width="300" height="210" fill="#FAFAF8" stroke="#0A0A0A" stroke-width="3"/>
    <rect x="0" y="0" width="300" height="44" class="ink"/>
    <text x="24" y="30" fill="#FAFAF8" class="micro">INPUT</text>
    <text x="28" y="102" class="label ink">单次 API</text>
    <text x="28" y="150" class="small muted">prompt + context</text>
    <text x="28" y="185" class="small muted">一次请求</text>
    <text x="0" y="-36" class="num ink">01</text>
  </g>

  <path d="M450 407 H560" class="blue-line" marker-end="url(#arrow)"/>

  <g transform="translate(600 235)">
    <rect x="0" y="0" width="410" height="345" fill="#FAFAF8" stroke="#002FA7" stroke-width="4"/>
    <line x1="0" y1="78" x2="410" y2="78" class="blue-thin"/>
    <text x="30" y="50" class="small blue">AGENT LOOP</text>
    <text x="30" y="130" class="label ink">多轮 Agent</text>
    <text x="30" y="176" class="small muted">plan / tool / verify</text>

    <rect x="42" y="224" width="86" height="56" fill="#002FA7"/>
    <text x="63" y="260" fill="#FFFFFF" class="micro">计划</text>
    <rect x="162" y="224" width="86" height="56" fill="#FAFAF8" stroke="#0A0A0A" stroke-width="2"/>
    <text x="183" y="260" class="micro ink">执行</text>
    <rect x="282" y="224" width="86" height="56" fill="#FAFAF8" stroke="#0A0A0A" stroke-width="2"/>
    <text x="303" y="260" class="micro ink">校验</text>
    <path d="M128 252 H156" class="blue-thin" marker-end="url(#arrow)"/>
    <path d="M248 252 H276" class="blue-thin" marker-end="url(#arrow)"/>
    <path d="M325 292 C325 324 85 324 85 292" class="blue-thin" marker-end="url(#arrow)"/>
    <text x="0" y="-36" class="num blue">10x</text>
  </g>

  <path d="M1045 407 H1155" class="blue-line" marker-end="url(#arrow)"/>

  <g transform="translate(1190 302)">
    <rect x="0" y="0" width="290" height="210" fill="#002FA7"/>
    <line x1="0" y1="44" x2="290" y2="44" stroke="#FFFFFF" stroke-width="2" opacity=".7"/>
    <text x="24" y="30" fill="#FFFFFF" class="micro">OUTPUT</text>
    <text x="28" y="102" fill="#FFFFFF" class="label">可验收结果</text>
    <text x="28" y="150" fill="#FFFFFF" class="small" opacity=".82">deliverable</text>
    <text x="28" y="185" fill="#FFFFFF" class="small" opacity=".82">testable artifact</text>
    <text x="0" y="-36" class="num blue">100x</text>
  </g>

  <g transform="translate(120 700)">
    <line x1="0" y1="0" x2="1360" y2="0" class="line"/>
    <rect x="0" y="50" width="230" height="54" class="ink"/>
    <rect x="230" y="50" width="420" height="54" fill="#FAFAF8" stroke="#0A0A0A" stroke-width="2"/>
    <rect x="650" y="50" width="710" height="54" class="blue"/>
    <text x="20" y="85" fill="#FFFFFF" class="micro">CALL</text>
    <text x="260" y="85" class="micro ink">ITERATION SPACE</text>
    <text x="684" y="85" fill="#FFFFFF" class="micro">ACCEPTANCE SURFACE</text>
    <text x="0" y="148" class="small muted">杠杆不来自复杂架构，而来自把一次请求变成可循环、可检查、可交付的工作系统。</text>
  </g>
</svg>
